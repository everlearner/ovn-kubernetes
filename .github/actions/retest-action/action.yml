name: 'Re-Test'
description: 'Re-Runs the last workflow for a PR'
inputs:
  token:
    description: 'GitHub API Token'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    GITHUB_TOKEN: ${{ inputs.token }}